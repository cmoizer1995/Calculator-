<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shift Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family:system-ui; padding:20px; }
.wrap { max-width:480px; margin:auto; }

button, input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
}

.btn-row { display:flex; gap:10px; }

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

td, th {
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

/* DROPDOWNS */
#settingsBox, #excelBox {
  display:none;
  padding:12px;
  border-radius:12px;
  background: rgba(0,0,0,0.05);
}

.dark-mode #settingsBox,
.dark-mode #excelBox {
  background: rgba(255,255,255,0.05);
}

/* DARK MODE */
.dark-mode {
  background:#121212;
  color:#fff;
}

.dark-mode input,
.dark-mode button {
  background:#2a2a2a;
  color:#fff;
}
</style>
</head>

<body>

<div class="wrap">

<div id="paydayBox" style="display:none;">
<h3 id="paydayText"></h3>
<p id="daysText"></p>
</div>

<p id="monthlyTop">Monthly total: £0.00</p>

<div class="btn-row">
<button onclick="toggleDark()">Dark</button>
<button onclick="resetAll()">Reset</button>
</div>

<!-- 📄 EXCEL DROPDOWN -->
<button onclick="toggleExcel()">📄 Excel Upload</button>

<div id="excelBox">
  <input type="file" id="fileInput">
  <button onclick="loadExcel()">Load Excel</button>
  <p id="status"></p>
</div>

<!-- ⚙ SETTINGS DROPDOWN -->
<button onclick="toggleSettings()">⚙ Pay Settings</button>

<div id="settingsBox">
  <label>Base £/hr</label>
  <input id="rate" type="number" value="12.21">

  <label>Holiday £/hr</label>
  <input id="holiday" type="number" value="1.47">

  <label>Hours per shift</label>
  <input id="hours" type="number" value="7">
</div>

<input id="shifts" type="number" placeholder="Shifts">
<input id="extra" type="number" placeholder="Extra hours">

<button onclick="calculate()">Add</button>

<table>
<thead>
<tr>
<th>Paydate</th>
<th>Shifts</th>
<th>Pay (£)</th>
<th></th>
</tr>
</thead>
<tbody id="tableBody">
<tr><td colspan="4">No entries</td></tr>
</tbody>
<tfoot>
<tr>
<td colspan="2">Total</td>
<td id="total">£0.00</td>
<td></td>
</tr>
</tfoot>
</table>

</div>

<script>

let paydays = [];
let entries = [];
let UK_BANK_HOLIDAYS = [];
let HOLIDAY_NAMES = {};

// LOAD BANK HOLIDAYS
window.onload = async function(){
  let res = await fetch("https://www.gov.uk/bank-holidays.json");
  let data = await res.json();

  let events = data["england-and-wales"].events;

  UK_BANK_HOLIDAYS = events.map(e => e.date);

  events.forEach(e=>{
    HOLIDAY_NAMES[e.date] = e.title;
  });
};

// TOGGLES
function toggleSettings(){
  let box = document.getElementById("settingsBox");
  box.style.display = (box.style.display === "none") ? "block" : "none";
}

function toggleExcel(){
  let box = document.getElementById("excelBox");
  box.style.display = (box.style.display === "none") ? "block" : "none";
}

// RESET BEFORE LOAD
function resetForNewUpload(){
  paydays = [];
  entries = [];

  document.getElementById("tableBody").innerHTML =
    "<tr><td colspan='4'>No entries</td></tr>";

  document.getElementById("total").innerText = "£0.00";
  document.getElementById("monthlyTop").innerText = "Monthly total: £0.00";

  document.getElementById("paydayBox").style.display = "none";
  document.getElementById("status").innerText = "";
}

// LOAD EXCEL
function loadExcel(){

  let file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Upload file");

  resetForNewUpload();

  let reader = new FileReader();

  reader.onload = function(e){

    let wb = XLSX.read(e.target.result,{type:'array'});
    let sheet = wb.Sheets[wb.SheetNames[0]];
    let rows = XLSX.utils.sheet_to_json(sheet,{header:1});

    let tempPaydays = [];

    rows.forEach(r=>{
      r.forEach(c=>{
        let d = parseDate(c);
        if(d) tempPaydays.push(d);
      });
    });

    tempPaydays = [...new Set(tempPaydays.map(d=>d.getTime()))]
      .map(t=>new Date(t))
      .sort((a,b)=>a-b);

    if(!tempPaydays.length){
      document.getElementById("status").innerText = "No dates detected";
      return;
    }

    paydays = tempPaydays;

    document.getElementById("status").innerText =
      "Excel loaded ✅ (" + paydays.length + " dates found)";

    updateHeader();
  };

  reader.readAsArrayBuffer(file);
}

// DATE PARSER
function parseDate(v){
  if(v instanceof Date) return v;
  if(typeof v==="number") return new Date((v-25569)*86400000);
  if(typeof v==="string" && v.includes("/")){
    let p=v.split("/");
    return new Date(p[2],p[1]-1,p[0]);
  }
  return null;
}

// NEXT PAYDAY
function getNextPayday(){
  let today=new Date();
  return paydays.find(d=>d>=today);
}

// ADJUST PAYDAY
function adjustPayday(date){
  let adjusted = new Date(date);

  while(
    adjusted.getDay()===0 ||
    adjusted.getDay()===6 ||
    UK_BANK_HOLIDAYS.includes(format(adjusted))
  ){
    adjusted.setDate(adjusted.getDate()-1);
  }

  return adjusted;
}

// BANK HOLIDAY DISPLAY
function updateHeader(){

  let original = getNextPayday();
  if(!original) return;

  let adjusted = adjustPayday(original);

  let today = new Date();
  let days = Math.ceil((adjusted - today)/86400000);

  let originalStr = format(original);
  let adjustedStr = format(adjusted);

  let nextDay = new Date(original);
  nextDay.setDate(nextDay.getDate() + 1);
  let nextDayStr = format(nextDay);

  let isOriginalBH = UK_BANK_HOLIDAYS.includes(originalStr);
  let nextDayIsBH = UK_BANK_HOLIDAYS.includes(nextDayStr);
  let wasAdjusted = originalStr !== adjustedStr;
  let isHiddenAdjustment = nextDayIsBH && !isOriginalBH;

  let holidayName =
    HOLIDAY_NAMES[originalStr] ||
    HOLIDAY_NAMES[nextDayStr] ||
    "Bank Holiday";

  document.getElementById("paydayBox").style.display="block";

  document.getElementById("daysText").innerText =
    days + " days" +
    (isOriginalBH || wasAdjusted || isHiddenAdjustment
      ? " (Bank Holiday - " + holidayName + ")"
      : ""
    );

  document.getElementById("paydayText").innerText =
    (isOriginalBH || wasAdjusted || isHiddenAdjustment)
      ? "Payday: " + adjustedStr +
        " (adjusted from " + (isOriginalBH ? originalStr : nextDayStr) + ")"
      : "Payday: " + adjustedStr;
}

// CALCULATE
function calculate(){

  let shifts = Number(document.getElementById("shifts").value);
  if(!shifts) return;

  let extra = Number(document.getElementById("extra").value)||0;

  let base = Number(document.getElementById("rate").value);
  let holiday = Number(document.getElementById("holiday").value);
  let hours = Number(document.getElementById("hours").value);

  let pay = shifts * hours * (base + holiday) + (extra * base);

  let payday = getNextPayday();
  if(!payday) return;

  let adjusted = adjustPayday(payday);

  entries.push({
    date: format(adjusted),
    shifts,
    pay
  });

  render();
}

// RENDER
function render(){

  let body=document.getElementById("tableBody");

  if(!entries.length){
    body.innerHTML="<tr><td colspan='4'>No entries</td></tr>";
    return;
  }

  body.innerHTML=entries.map((e,i)=>`
    <tr>
      <td>${e.date}</td>
      <td>${e.shifts}</td>
      <td>£${e.pay.toFixed(2)}</td>
      <td><button onclick="removeEntry(${i})">x</button></td>
    </tr>
  `).join("");

  let total=entries.reduce((s,e)=>s+e.pay,0);

  document.getElementById("total").innerText="£"+total.toFixed(2);
  document.getElementById("monthlyTop").innerText=
    "Monthly total: £"+total.toFixed(2);
}

// REMOVE
function removeEntry(i){
  entries.splice(i,1);
  render();
}

// RESET
function resetAll(){
  entries=[];
  document.getElementById("tableBody").innerHTML="<tr><td colspan='4'>No entries</td></tr>";
  document.getElementById("total").innerText="£0.00";
  document.getElementById("monthlyTop").innerText="Monthly total: £0.00";
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark-mode");
}

// FORMAT
function format(d){
  return d.toISOString().split("T")[0];
}

</script>

</body>
</html>
