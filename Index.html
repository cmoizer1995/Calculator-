<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shift Pay Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
  font-family:system-ui;
  padding:20px;
  margin:0;
  background:#fff;
  color:#000;
}

body.dark{
  background:#0f0f0f;
  color:#fff;
}

.wrap{max-width:480px;margin:auto;}
.block{margin-bottom:14px;}

button,input,select{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:1px solid #ccc;
  font-size:16px;
  background:#f9f9f9;
}

body.dark button,
body.dark input,
body.dark select{
  background:#1e1e1e;
  border-color:#333;
  color:#fff;
}

.btn-row{display:flex;gap:12px;}
.btn-row button{flex:1;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  table-layout:fixed;
}

td,th{
  padding:10px 6px;
  font-size:14px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th:nth-child(1),td:nth-child(1){width:30%;}
th:nth-child(2),td:nth-child(2){width:20%;}
th:nth-child(3),td:nth-child(3){width:12%;}
th:nth-child(4),td:nth-child(4){width:23%;}
th:nth-child(5),td:nth-child(5){width:15%;}

td:nth-child(2){font-weight:600;}

td button{
  padding:6px 10px;
  border-radius:10px;
  width:auto;
}

tfoot td{
  font-weight:600;
}

.footer{
  text-align:center;
  margin-top:28px;
  font-size:14px;
  opacity:0.7;
}

/* hidden dropdown */
#periodSelect{
  position:absolute;
  opacity:0;
  pointer-events:none;
  height:0;
}
</style>
</head>

<body>

<div class="wrap">

<div class="block" id="periodText"></div>
<div class="block" id="monthlyTop">Monthly total: £0.00</div>

<!-- BUTTONS -->
<div class="block btn-row">
<button onclick="toggleExcel()">📄</button>
<button onclick="toggleSettings()">⚙️</button>
<button onclick="toggleDark()">🌙</button>
<button onclick="showInfo()">ℹ️</button>
</div>

<!-- EXCEL PANEL -->
<div id="excelBox" class="block" style="display:none;">
<input type="file" id="fileInput">
<button onclick="loadExcel()">Load Excel</button>
</div>

<!-- SETTINGS -->
<div id="settingsBox" class="block" style="display:none;">
<input id="rate" type="number" value="12.21">
<input id="holiday" type="number" value="1.47">
<input id="hours" type="number" value="7">
</div>

<!-- HIDDEN DROPDOWN -->
<select id="periodSelect" onchange="updateFromDropdown()"></select>

<!-- INPUT -->
<div class="block">
<input id="shifts" type="number" placeholder="Shifts">
</div>

<div class="block">
<button onclick="calculate()">Add</button>
</div>

<div class="block">
<button onclick="resetAll()">Reset</button>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Period</th>
<th>Payday</th>
<th>Shifts</th>
<th>Pay (£)</th>
<th></th>
</tr>
</thead>

<tbody id="tableBody">
<tr><td colspan="5">No entries</td></tr>
</tbody>

<tfoot>
<tr>
<td colspan="3">Total</td>
<td id="total">£0.00</td>
<td></td>
</tr>
</tfoot>
</table>

<div class="footer">
Built by <a href="https://connormoizer.com" target="_blank">Connor Moizer</a>
</div>

</div>

<script>

let periods=[];
let entries=[];

window.onload=function(){

let savedEntries=localStorage.getItem("savedEntries");
if(savedEntries) entries=JSON.parse(savedEntries);

let savedPeriods=localStorage.getItem("savedPeriods");
if(savedPeriods){
periods=JSON.parse(savedPeriods).map(p=>({
from:new Date(p.from),
cutoff:new Date(p.cutoff),
payday:new Date(p.payday)
}));

filterOldPeriods();
}

// 🔥 AUTO HIDE IF DATA EXISTS
if(periods.length){
document.getElementById("excelBox").style.display="none";
}

let dark=localStorage.getItem("darkMode");
if(dark==="on") document.body.classList.add("dark");

render();
};

// TOGGLES
function toggleExcel(){
let el=document.getElementById("excelBox");
el.style.display = el.style.display==="none" ? "block" : "none";
}

function toggleSettings(){
let el=document.getElementById("settingsBox");
el.style.display = el.style.display==="none" ? "block" : "none";
}

// DARK MODE
function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("darkMode",
document.body.classList.contains("dark")?"on":"off");
}

// RESET TABLE ONLY
function resetAll(){
entries=[];
localStorage.removeItem("savedEntries");
render();
document.getElementById("monthlyTop").innerText="Monthly total: £0.00";
}

// INFO
function showInfo(){
alert("Upload Excel → Add shifts → Done");
}

// DATE PARSE
function parseDate(v){
if(!v) return null;
if(v instanceof Date && !isNaN(v)) return v;
if(typeof v==="number") return new Date((v-25569)*86400000);
if(typeof v==="string") return new Date(v);
return null;
}

// FORMAT
function formatDate(d){
return d.toLocaleDateString('en-GB',{
day:'numeric',month:'short',year:'numeric'
});
}

// FILTER
function filterOldPeriods(){

let today=new Date();

periods = periods.filter(p => {
let nextDay = new Date(p.payday);
nextDay.setDate(nextDay.getDate()+1);
return today < nextDay;
});

localStorage.setItem("savedPeriods", JSON.stringify(periods));
populateDropdown();
}

// LOAD EXCEL
function loadExcel(){

let file=document.getElementById("fileInput").files[0];
if(!file) return alert("Upload file");

let reader=new FileReader();

reader.onload=function(e){

let wb=XLSX.read(e.target.result,{type:'array'});
let rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});

periods=[];

let headerRow = rows.find(r => 
r.map(x => String(x).trim().toUpperCase()).includes("FROM")
);

let fromIndex = headerRow.findIndex(c => String(c).trim().toUpperCase() === "FROM");
let cutoffIndex = headerRow.findIndex(c => String(c).trim().toUpperCase() === "CUT OFF");
let paydayIndex = headerRow.findIndex(c => String(c).trim().toUpperCase() === "PAYDATE");

rows.forEach(r=>{
let from=parseDate(r[fromIndex]);
let cutoff=parseDate(r[cutoffIndex]);
let payday=parseDate(r[paydayIndex]);
if(from && cutoff && payday){
periods.push({from,cutoff,payday});
}
});

periods.sort((a,b)=>a.payday-b.payday);

localStorage.setItem("savedPeriods", JSON.stringify(periods));

filterOldPeriods();

// 🔥 AUTO HIDE AFTER LOAD
document.getElementById("excelBox").style.display="none";

};

reader.readAsArrayBuffer(file);
}

// DROPDOWN
function populateDropdown(){

let select=document.getElementById("periodSelect");
select.innerHTML='';

periods.forEach((p,i)=>{
let option=document.createElement("option");
option.value=i;
select.appendChild(option);
});

if(periods.length){
select.value=0;
updateFromDropdown();
}
}

// SELECT
function updateFromDropdown(){

let i=document.getElementById("periodSelect").value;
if(i==="") return;

let p=periods[i];

document.getElementById("periodText").innerHTML=
`Work Period:<br>
${formatDate(p.from)} → ${formatDate(p.cutoff)}<br>
Payday: ${formatDate(p.payday)}`;
}

// CALCULATE
function calculate(){

let shifts=Number(document.getElementById("shifts").value);
if(!shifts) return alert("Enter shifts");

let i=document.getElementById("periodSelect").value;
let p=periods[i];

let base=Number(document.getElementById("rate").value)||0;
let holiday=Number(document.getElementById("holiday").value)||0;
let hours=Number(document.getElementById("hours").value)||0;

let pay=shifts*hours*(base+holiday);

entries.push({
period:`${formatDate(p.from)} → ${formatDate(p.cutoff)}`,
payday:formatDate(p.payday),
shifts,
pay
});

localStorage.setItem("savedEntries",JSON.stringify(entries));

render();
document.getElementById("shifts").value="";
}

// RENDER
function render(){

let body=document.getElementById("tableBody");
let totalEl=document.getElementById("total");
let monthlyTop=document.getElementById("monthlyTop");

if(!entries.length){
body.innerHTML="<tr><td colspan='5'>No entries</td></tr>";
totalEl.innerText="£0.00";
monthlyTop.innerText="Monthly total: £0.00";
return;
}

body.innerHTML=entries.map((e,i)=>`
<tr>
<td>${e.period}</td>
<td>${e.payday}</td>
<td>${e.shifts}</td>
<td>£${e.pay.toFixed(2)}</td>
<td><button onclick="removeEntry(${i})">x</button></td>
</tr>
`).join("");

let total=entries.reduce((s,e)=>s+e.pay,0);

totalEl.innerText="£"+total.toFixed(2);
monthlyTop.innerText="Monthly total: £"+total.toFixed(2);
}

// REMOVE
function removeEntry(i){
entries.splice(i,1);
localStorage.setItem("savedEntries",JSON.stringify(entries));
render();
}

</script>

</body>
</html>
