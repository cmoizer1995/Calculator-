<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

<title>Cleaner Pay Calculator</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CleanerPay">
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
font-family:-apple-system,system-ui;
margin:0;
background:#f5f5f5;
transition:0.2s;
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
}

body.dark{
background:#0b1220;
color:#fff;
}

.wrap{
width:100%;
max-width:1200px;
margin:auto;
padding:clamp(12px,3vw,24px);
display:flex;
flex-direction:column;
gap:clamp(12px,2vw,20px);
}

.card{
background:#fff;
padding:clamp(14px,2.5vw,22px);
border-radius:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

body.dark .card{
background:#111827;
}

input,button{
width:100%;
padding:clamp(14px,2.5vw,20px);
border-radius:18px;
border:1px solid #ddd;
font-size:16px;
}

body.dark input,
body.dark button{
background:#1f2937;
color:#fff;
border:1px solid #374151;
}

.btn-row{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.btn-row button{
flex:1;
background:#f0f0f0;
}

body.dark .btn-row button{
background:#374151;
}

#liveHeader{
font-weight:600;
margin-bottom:10px;
}

#installPrompt{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(255,255,255,0.95);
color:#000;
padding:20px;
border-radius:20px 20px 0 0;
display:none;
z-index:9999;
backdrop-filter:blur(20px);
box-shadow:0 -10px 30px rgba(0,0,0,0.1);
animation:slideUp 0.3s ease;
}

body.dark #installPrompt{
background:rgba(17,24,39,0.95);
color:#fff;
box-shadow:0 -10px 30px rgba(0,0,0,0.4);
}

body.dark #installPrompt button{
background:#374151;
color:#fff;
border:1px solid #4b5563;
}

@keyframes slideUp{
from{transform:translateY(100%);}
to{transform:translateY(0);}
}

.footer{
text-align:center;
font-size:13px;
opacity:0.7;
margin-top:10px;
}

.footer a{
color:inherit;
text-decoration:none;
font-weight:500;
}

.footer a:hover{
text-decoration:underline;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
<div id="liveHeader"></div>
<div id="summaryBox">Loading...</div>
</div>

<div class="btn-row">
<button onclick="toggleExcel()">📄</button>
<button onclick="toggleSettings()">⚙️</button>
<button onclick="toggleDark()">🌙</button>
<button onclick="showInstall()">⬇️</button>
</div>

<div id="excelBox" class="card" style="display:none;">
<input type="file" id="fileInput">
<button onclick="loadExcel()">Load Excel</button>
</div>

<div id="settingsBox" class="card" style="display:none;">
<input id="rate" type="number" value="12.21">
<input id="holiday" type="number" value="1.47375">
<input id="hours" type="number" value="7">
</div>

<input id="shifts" placeholder="Shifts">

<div class="btn-row">
<button onclick="calculate()">Add</button>
<button onclick="resetAll()">Reset</button>
</div>

<div class="footer">
Created by <a href="https://ConnorMoizer.com" target="_blank">Connor Moizer</a>
</div>

</div>

<div id="installPrompt">
<div style="text-align:center;font-weight:600;margin-bottom:10px;">
Install Cleaner Pay
</div>

<div id="installText" style="font-size:14px;text-align:center;margin-bottom:15px;"></div>

<div style="display:flex;gap:10px;">
<button onclick="confirmInstall()">Install</button>
<button onclick="closeInstall()">Cancel</button>
</div>
</div>

<script>

/*
© 2026 Connor Moizer
All rights reserved
*/

document.addEventListener("DOMContentLoaded", function(){

let periods=[],entries=[];

const shifts=document.getElementById("shifts");
const summaryBox=document.getElementById("summaryBox");
const liveHeader=document.getElementById("liveHeader");
const excelBox=document.getElementById("excelBox");
const settingsBox=document.getElementById("settingsBox");
const fileInput=document.getElementById("fileInput");

/* INSTALL */
let deferredPrompt=null;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
});

function isIOS(){
return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

window.showInstall=function(){
let el=document.getElementById("installPrompt");

if(el.style.display==="block"){
el.style.display="none";
return;
}

el.style.display="block";

if(isIOS()){
document.getElementById("installText").innerHTML=
"Tap <b>Share</b> (⬆️) then <b>Add to Home Screen</b>";
}else{
document.getElementById("installText").innerHTML=
"Install this app on your device";
}
};

window.closeInstall=function(){
document.getElementById("installPrompt").style.display="none";
};

window.confirmInstall=function(){
closeInstall();

if(deferredPrompt){
deferredPrompt.prompt();
deferredPrompt.userChoice.then(()=>{
deferredPrompt=null;
});
return;
}

alert("Tap Share → Add to Home Screen");
};

/* HEADER */
function loadHeader(){
let now=new Date();
liveHeader.innerHTML=
now.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
+" • "+
now.toLocaleTimeString('en-GB',{hour:'numeric',minute:'2-digit',second:'2-digit'});
}
setInterval(loadHeader,1000);

/* DARK MODE */
window.toggleDark=()=>{
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark"));
};

if(localStorage.getItem("dark")==="true"){
document.body.classList.add("dark");
}

/* TOGGLES */
window.toggleExcel=()=>excelBox.style.display=excelBox.style.display==="none"?"block":"none";
window.toggleSettings=()=>settingsBox.style.display=settingsBox.style.display==="none"?"block":"none";

/* ROUND */
function round(v){return Math.round(v*100)/100;}

/* DATE */
function parseDate(v){
if(typeof v==="number") return new Date((v-25569)*86400000);
return new Date(v);
}
function formatDate(d){
return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

/* LOAD EXCEL */
window.loadExcel=async function(){

let f=fileInput.files[0];
if(!f)return alert("Upload file");

let r=new FileReader();

r.onload=function(e){

let wb=XLSX.read(e.target.result,{type:'array'});
let rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});

periods=[];

let hi=rows.findIndex(r=>r.map(x=>String(x).toUpperCase()).includes("PAYDATE"));
let h=rows[hi];

let fi=h.findIndex(c=>String(c).toUpperCase()==="FROM");
let ci=h.findIndex(c=>String(c).toUpperCase().includes("CUT"));
let pi=h.findIndex(c=>String(c).toUpperCase()==="PAYDATE");

rows.slice(hi+1).forEach(r=>{
let f=parseDate(r[fi]);
let c=parseDate(r[ci]);
let p=parseDate(r[pi]);
if(f&&c&&p){
periods.push({from:f,cutoff:c,payday:p});
}
});

localStorage.setItem("periods",JSON.stringify(periods));

entries=[];
shifts.value="";
render();
excelBox.style.display="none";

};

r.readAsArrayBuffer(f);
};

/* LOAD */
function loadAll(){
let p=localStorage.getItem("periods");
if(p) periods=JSON.parse(p);
entries=[];
render();
}

/* PERIOD */
function getCurrentPeriod(){
if(!periods.length) return null;

let today=new Date();

for(let i=0;i<periods.length;i++){
let from=new Date(periods[i].from);
let nextFrom=periods[i+1]?new Date(periods[i+1].from):null;

if(today>=from && (!nextFrom||today<nextFrom)){
return periods[i];
}
}
return null;
}

/* CALCULATE */
window.calculate=function(){

let s=Number(shifts.value);
if(!s||s<=0){shifts.value="";return;}

let h=Number(document.getElementById("hours").value);
let total=s*h;

let basic=round(total*Number(document.getElementById("rate").value));
let holiday=round(total*Number(document.getElementById("holiday").value));
let gross=round(basic+holiday);

entries=[{gross,shifts:s}];

render();
shifts.value="";

setTimeout(()=>{
shifts.blur();
document.activeElement.blur();
shifts.setAttribute("readonly", true);
setTimeout(()=>shifts.removeAttribute("readonly"), 50);
},50);
};

/* RENDER */
function render(){

let p=getCurrentPeriod();

let gross=entries.reduce((s,e)=>s+(e.gross||0),0);
let shiftsCount=entries.reduce((s,e)=>s+(e.shifts||0),0);

let pen=round(gross*0.04);

let weeks=2;
let weekly=round(gross/weeks);
let ni=0;
if(weekly>242){
ni=round((weekly-242)*0.08)*weeks;
}

let allowance=(12570/52)*weeks;
let tax=0;
if(gross>allowance){
tax=round((gross-allowance)*0.2);
}

let net=round(gross-pen-tax-ni);

summaryBox.innerHTML=`

${p && p.from && p.cutoff && p.payday ? `
Working Period: ${formatDate(p.from)} → ${formatDate(p.cutoff)}<br>
Payday: ${formatDate(p.payday)}<br><br>
` : ""}

Before deductions: £${gross.toFixed(2)}<br>

Deducted:
Pension £${pen.toFixed(2)} |
Tax £${tax.toFixed(2)} |
NI £${ni.toFixed(2)}<br>

After deductions: £${net.toFixed(2)} (${shiftsCount||0} shifts)

`;
}

/* RESET */
window.resetAll=()=>{
entries=[];
render();
};

/* ENTER */
shifts.addEventListener("keyup", function(e){
if(e.key==="Enter"||e.key==="Go"||e.key==="Done"){
e.preventDefault();
calculate();
}
});

/* SERVICE WORKER */
setTimeout(()=>{
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
},500);

/* INIT */
loadHeader();
loadAll();

});
</script>

</body>
</html>
