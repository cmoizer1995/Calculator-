<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shift Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

/* 🔥 GLOBAL FIX */
* {
  box-sizing: border-box;
}

body {
  font-family: system-ui;
  padding: 20px;
}

.wrap {
  max-width: 480px;
  margin: auto;
}

/* 🔥 MATCH BUTTON + INPUT SIZE */
button, input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border-radius: 14px;
  border: 1px solid #ccc;
  font-size: 16px;
}

/* BUTTON ROW */
.btn-row {
  display: flex;
  gap: 10px;
}

.btn-row button {
  flex: 1;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

td, th {
  padding: 12px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

/* DROPDOWNS */
#settingsBox, #excelBox {
  display: none;
  padding: 12px;
  border-radius: 12px;
  background: rgba(0,0,0,0.05);
}

/* DARK MODE */
.dark-mode {
  background: #121212;
  color: #fff;
}

.dark-mode input,
.dark-mode button {
  background: #2a2a2a;
  color: #fff;
  border: 1px solid #444;
}

.dark-mode #settingsBox,
.dark-mode #excelBox {
  background: rgba(255,255,255,0.05);
}

/* POPUP */
#instructionsModal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
}

#instructionsContent {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: 10% auto;
}

.dark-mode #instructionsContent {
  background: #1e1e1e;
  color: #fff;
}

</style>
</head>

<body>

<div class="wrap">

<div id="paydayBox" style="display:none;">
<h3 id="paydayText"></h3>
<p id="daysText"></p>
</div>

<p id="monthlyTop">Monthly total: £0.00</p>

<div class="btn-row">
<button onclick="toggleDark()">Dark</button>
<button onclick="resetAll()">Reset</button>
<button onclick="openInstructions()">ℹ</button>
</div>

<!-- EXCEL -->
<button onclick="toggleExcel()">📄 Excel Upload</button>

<div id="excelBox">
  <input type="file" id="fileInput">
  <button onclick="loadExcel()">Load Excel</button>
  <p id="status"></p>
</div>

<!-- SETTINGS -->
<button onclick="toggleSettings()">⚙ Pay Settings</button>

<div id="settingsBox">
  <input id="rate" type="number" value="12.21" placeholder="Base £/hr">
  <input id="holiday" type="number" value="1.47" placeholder="Holiday £/hr">
  <input id="hours" type="number" value="7" placeholder="Hours">
</div>

<!-- INPUTS -->
<input id="shifts" type="number" placeholder="Shifts">
<input id="extra" type="number" placeholder="Extra hours">

<button onclick="calculate()">Add</button>

<table>
<thead>
<tr>
<th>Paydate</th>
<th>Shifts</th>
<th>Pay (£)</th>
<th></th>
</tr>
</thead>

<tbody id="tableBody">
<tr><td colspan="4">No entries</td></tr>
</tbody>

<tfoot>
<tr>
<td colspan="2">Total</td>
<td id="total">£0.00</td>
<td></td>
</tr>
</tfoot>
</table>

</div>

<!-- POPUP -->
<div id="instructionsModal">
<div id="instructionsContent">

<h2>How to use</h2>

<p>Upload Excel → Add shifts → See pay.</p>

<button onclick="closeInstructions()">Close</button>

</div>
</div>

<script>

let paydays = [];
let entries = [];
let UK_BANK_HOLIDAYS = [];
let HOLIDAY_NAMES = {};

// LOAD HOLIDAYS
window.onload = async function(){
  let res = await fetch("https://www.gov.uk/bank-holidays.json");
  let data = await res.json();

  let events = data["england-and-wales"].events;

  UK_BANK_HOLIDAYS = events.map(e => e.date);

  events.forEach(e=>{
    HOLIDAY_NAMES[e.date] = e.title;
  });
};

// TOGGLES
function toggleSettings(){
  let box = document.getElementById("settingsBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function toggleExcel(){
  let box = document.getElementById("excelBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function toggleDark(){
  document.body.classList.toggle("dark-mode");
}

function openInstructions(){
  instructionsModal.style.display = "block";
}

function closeInstructions(){
  instructionsModal.style.display = "none";
}

// RESET
function resetAll(){
  entries = [];
  tableBody.innerHTML = "<tr><td colspan='4'>No entries</td></tr>";
  total.innerText = "£0.00";
  monthlyTop.innerText = "Monthly total: £0.00";
}

// LOAD EXCEL
function loadExcel(){

  let file = fileInput.files[0];
  if(!file) return;

  let reader = new FileReader();

  reader.onload = function(e){

    let wb = XLSX.read(e.target.result,{type:'array'});
    let sheet = wb.Sheets[wb.SheetNames[0]];
    let rows = XLSX.utils.sheet_to_json(sheet,{header:1});

    let temp = [];

    rows.forEach(r=>{
      r.forEach(c=>{
        let d = parseDate(c);
        if(d) temp.push(d);
      });
    });

    paydays = [...new Set(temp.map(d=>d.getTime()))]
      .map(t=>new Date(t))
      .sort((a,b)=>a-b);

    status.innerText = "Excel loaded ✅";

    updateHeader();

    excelBox.style.display = "none";
  };

  reader.readAsArrayBuffer(file);
}

// DATE
function parseDate(v){
  if(v instanceof Date) return v;
  if(typeof v==="number") return new Date((v-25569)*86400000);
  if(typeof v==="string" && v.includes("/")){
    let p=v.split("/");
    return new Date(p[2],p[1]-1,p[0]);
  }
}

function format(d){
  return d.toISOString().split("T")[0];
}

function getNextPayday(){
  let today=new Date();
  return paydays.find(d=>d>=today);
}

function adjustPayday(date){
  let d=new Date(date);
  while(
    d.getDay()===0 ||
    d.getDay()===6 ||
    UK_BANK_HOLIDAYS.includes(format(d))
  ){
    d.setDate(d.getDate()-1);
  }
  return d;
}

// HEADER
function updateHeader(){

  let p = getNextPayday();
  if(!p) return;

  let a = adjustPayday(p);

  paydayBox.style.display="block";
  paydayText.innerText="Payday: "+format(a);
}

// CALCULATE (FIXED)
function calculate(){

  let shifts = Number(document.getElementById("shifts").value);
  if(!shifts) return;

  let extra = Number(document.getElementById("extra").value) || 0;

  let base = Number(document.getElementById("rate").value);
  let holiday = Number(document.getElementById("holiday").value);
  let hours = Number(document.getElementById("hours").value);

  let pay = shifts * hours * (base + holiday) + (extra * base);

  let payday = getNextPayday();
  if(!payday) return;

  let d = format(adjustPayday(payday));

  entries.push({date:d,shifts,pay});

  render();

  settingsBox.style.display = "none";
}

// RENDER
function render(){

  if(!entries.length){
    tableBody.innerHTML="<tr><td colspan='4'>No entries</td></tr>";
    return;
  }

  tableBody.innerHTML = entries.map((e,i)=>`
    <tr>
      <td>${e.date}</td>
      <td>${e.shifts}</td>
      <td>£${e.pay.toFixed(2)}</td>
      <td><button onclick="removeEntry(${i})">x</button></td>
    </tr>
  `).join("");

  let t = entries.reduce((s,e)=>s+e.pay,0);

  total.innerText="£"+t.toFixed(2);
  monthlyTop.innerText="Monthly total: £"+t.toFixed(2);
}

function removeEntry(i){
  entries.splice(i,1);
  render();
}

</script>

</body>
</html>
