<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shift Pay Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
  font-family:system-ui;
  padding:20px;
  margin:0;
  background:#fff;
  color:#000;
}

body.dark{
  background:#0f0f0f;
  color:#fff;
}

/* 🔥 RESPONSIVE WRAP */
.wrap{
  width:100%;
  max-width:1100px;
  margin:auto;
}

.block{margin-bottom:14px;}

button,input,select{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:1px solid #ccc;
  font-size:16px;
  background:#f9f9f9;
}

body.dark button,
body.dark input,
body.dark select{
  background:#1e1e1e;
  border-color:#333;
  color:#fff;
}

.btn-row{display:flex;gap:12px;}
.btn-row button{flex:1;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  table-layout:fixed;
}

td,th{
  padding:14px 10px;
  font-size:15px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

tfoot td{font-weight:600;}

.footer{
  text-align:center;
  margin-top:28px;
  font-size:14px;
  opacity:0.7;
}

#periodSelect{
  position:absolute;
  opacity:0;
  pointer-events:none;
  height:0;
}

body.dark #infoBox{
  background:#1e1e1e;
  color:#fff;
}

/* 📱 TABLET */
@media (min-width:600px){
.wrap{max-width:700px;}
button,input{font-size:17px;}
}

/* 💻 DESKTOP */
@media (min-width:900px){
.wrap{max-width:1100px;}
.btn-row{gap:20px;}
.block{margin-bottom:18px;}
}

/* 🖥️ LARGE */
@media (min-width:1200px){
.wrap{max-width:1200px;}
}
</style>
</head>

<body>

<div class="wrap">

<div class="block" id="periodText"></div>
<div class="block" id="monthlyTop">Monthly total: £0.00</div>

<div class="block btn-row">
<button onclick="toggleExcel()">📄</button>
<button onclick="toggleSettings()">⚙️</button>
<button onclick="toggleDark()">🌙</button>
<button onclick="showInfo()">ℹ️</button>
</div>

<div id="excelBox" class="block" style="display:none;">
<input type="file" id="fileInput">
<button onclick="loadExcel()">Load Excel</button>
</div>

<div id="settingsBox" class="block" style="display:none;">
<input id="rate" type="number" value="12.21">
<input id="holiday" type="number" value="1.47">
<input id="hours" type="number" value="7">
</div>

<select id="periodSelect" onchange="updateFromDropdown()"></select>

<div class="block">
<input id="shifts" type="number" placeholder="Shifts">
</div>

<div class="block">
<button onclick="calculate()">Add</button>
</div>

<div class="block">
<button onclick="resetAll()">Reset</button>
</div>

<table>
<thead>
<tr>
<th>Period</th>
<th>Payday</th>
<th>Shifts</th>
<th>Pay (£)</th>
<th></th>
</tr>
</thead>

<tbody id="tableBody">
<tr><td colspan="5">No entries</td></tr>
</tbody>

<tfoot>
<tr>
<td colspan="3">Total</td>
<td id="total">£0.00</td>
<td></td>
</tr>
</tfoot>
</table>

<div class="footer">
Built by <a href="https://connormoizer.com" target="_blank">Connor Moizer</a>
</div>

</div>

<!-- INFO MODAL -->
<div id="infoModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:999;">
  <div id="infoBox" style="
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:400px;
    background:#fff;
    padding:20px;
    border-radius:20px;
    max-height:80%;
    overflow:auto;
  ">
    <h3>Shift Pay Calculator</h3>
    <p>
    Upload Excel once → Enter shifts → Get pay<br><br>
    • Saves to your device<br>
    • No re-upload needed<br>
    • Bank holidays auto-adjust paydays<br>
    • Works offline after setup
    </p>
    <button onclick="closeInfo()">Close</button>
  </div>
</div>

<script>

let periods=[];
let entries=[];
let holidays=[];

// BANK HOLIDAYS
async function loadBankHolidays(){
  try{
    let res = await fetch("https://www.gov.uk/bank-holidays.json");
    let data = await res.json();
    holidays = data["england-and-wales"].events.map(e => e.date);
    applyHolidayAdjustments();
  }catch(e){}
}

// APPLY ADJUST
function applyHolidayAdjustments(){

if(!periods.length || !holidays.length) return;

periods = periods.map(p => {

let d = new Date(p.payday);
let adjusted=false;

while(true){
let iso=d.toISOString().split("T")[0];
let day=d.getDay();

if(holidays.includes(iso)||day===0||day===6){
d.setDate(d.getDate()-1);
adjusted=true;
}else break;
}

return {...p,payday:d,adjusted};
});

localStorage.setItem("savedPeriods", JSON.stringify(periods));

populateDropdown();
render();
}

// LOAD
window.onload=function(){

let savedEntries=localStorage.getItem("savedEntries");
if(savedEntries) entries=JSON.parse(savedEntries);

let savedPeriods=localStorage.getItem("savedPeriods");

if(savedPeriods){
periods=JSON.parse(savedPeriods).map(p=>({
from:new Date(p.from),
cutoff:new Date(p.cutoff),
payday:new Date(p.payday),
adjusted:p.adjusted||false
}));

filterOldPeriods();
populateDropdown();
}

if(periods.length){
document.getElementById("excelBox").style.display="none";
}

let dark=localStorage.getItem("darkMode");
if(dark==="on") document.body.classList.add("dark");

render();
};

// TOGGLES
function toggleExcel(){excelBox.style.display=excelBox.style.display==="none"?"block":"none";}
function toggleSettings(){settingsBox.style.display=settingsBox.style.display==="none"?"block":"none";}
function toggleDark(){document.body.classList.toggle("dark");localStorage.setItem("darkMode",document.body.classList.contains("dark")?"on":"off");}
function showInfo(){infoModal.style.display="block";}
function closeInfo(){infoModal.style.display="none";}
function resetAll(){entries=[];localStorage.removeItem("savedEntries");render();}

// DATE
function parseDate(v){
if(!v)return null;
if(v instanceof Date)return v;
if(typeof v==="number")return new Date((v-25569)*86400000);
return new Date(v);
}

function formatDate(d){
return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

// FILTER
function filterOldPeriods(){
let today=new Date();
periods=periods.filter(p=>{
let next=new Date(p.payday);next.setDate(next.getDate()+1);
return today<next;
});
localStorage.setItem("savedPeriods", JSON.stringify(periods));
}

// LOAD EXCEL
function loadExcel(){

let file=fileInput.files[0];
if(!file)return alert("Upload file");

let reader=new FileReader();

reader.onload=function(e){

let wb=XLSX.read(e.target.result,{type:'array'});
let rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});

periods=[];

let headerRow=rows.find(r=>r.map(x=>String(x).toUpperCase()).includes("FROM"));

let fromIndex=headerRow.findIndex(c=>String(c).toUpperCase()==="FROM");
let cutoffIndex=headerRow.findIndex(c=>String(c).toUpperCase()==="CUT OFF");
let paydayIndex=headerRow.findIndex(c=>String(c).toUpperCase()==="PAYDATE");

rows.forEach(r=>{
let from=parseDate(r[fromIndex]);
let cutoff=parseDate(r[cutoffIndex]);
let payday=parseDate(r[paydayIndex]);
if(from&&cutoff&&payday){
periods.push({from,cutoff,payday,adjusted:false});
}
});

periods.sort((a,b)=>a.payday-b.payday);

localStorage.setItem("savedPeriods", JSON.stringify(periods));

filterOldPeriods();
populateDropdown();

loadBankHolidays();

excelBox.style.display="none";
};

reader.readAsArrayBuffer(file);
}

// DROPDOWN
function populateDropdown(){
periodSelect.innerHTML='';
periods.forEach((p,i)=>{
let o=document.createElement("option");
o.value=i;
periodSelect.appendChild(o);
});
if(periods.length){
periodSelect.value=0;
updateFromDropdown();
}
}

// DISPLAY
function updateFromDropdown(){
let p=periods[periodSelect.value];
periodText.innerHTML=
`${formatDate(p.from)} → ${formatDate(p.cutoff)}<br>
Payday: ${formatDate(p.payday)}
${p.adjusted?"<br><small>(Adjusted)</small>":""}`;
}

// CALCULATE
function calculate(){

let shiftsInput=document.getElementById("shifts");
let shifts=Number(shiftsInput.value);
if(!shifts)return alert("Enter shifts");

let p=periods[periodSelect.value];

let base=Number(rate.value)||0;
let holidayRate=Number(document.getElementById("holiday").value)||0;
let hoursPerShift=Number(document.getElementById("hours").value)||0;

let pay=shifts*hoursPerShift*(base+holidayRate);

entries.push({
period:`${formatDate(p.from)} → ${formatDate(p.cutoff)}`,
payday:formatDate(p.payday),
shifts,
pay
});

localStorage.setItem("savedEntries",JSON.stringify(entries));

render();
shiftsInput.value="";
}

// RENDER
function render(){

if(!entries.length){
tableBody.innerHTML="<tr><td colspan='5'>No entries</td></tr>";
total.innerText="£0.00";
monthlyTop.innerText="Monthly total: £0.00";
return;
}

tableBody.innerHTML=entries.map((e,i)=>`
<tr>
<td>${e.period}</td>
<td>${e.payday}</td>
<td>${e.shifts}</td>
<td>£${e.pay.toFixed(2)}</td>
<td><button onclick="removeEntry(${i})">x</button></td>
</tr>`).join("");

let totalVal=entries.reduce((s,e)=>s+e.pay,0);

total.innerText="£"+totalVal.toFixed(2);
monthlyTop.innerText="Monthly total: £"+totalVal.toFixed(2);
}

// REMOVE
function removeEntry(i){
entries.splice(i,1);
localStorage.setItem("savedEntries",JSON.stringify(entries));
render();
}

</script>

</body>
</html>
